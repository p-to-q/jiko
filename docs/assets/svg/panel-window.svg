<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 236 102" width="236" height="102" role="img" aria-label="jiko LED window (empty)">
  <title>jiko LED window — board, dot grid, glow</title>
  <defs>
    <linearGradient id="board-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#100f0d"/>
      <stop offset="1" stop-color="#060605"/>
    </linearGradient>
    <linearGradient id="screen-orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080805"/>
      <stop offset="0.62" stop-color="#050403"/>
      <stop offset="1" stop-color="#020202"/>
    </linearGradient>
    <radialGradient id="ambient-orange" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#f09035" stop-opacity="0.16"/>
      <stop offset="0.72" stop-color="#f09035" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vignette-orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0.4" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="sheen-orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="screen-halo-orange" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="led-glow-orange" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- board / bezel -->
  <rect x="0.5" y="0.5" width="235" height="101" rx="22" fill="url(#board-orange)" stroke="rgba(244,202,112,0.30)" stroke-width="1"/>
  <rect x="6.5" y="6.5" width="223" height="89" rx="17" fill="url(#ambient-orange)"/>
  <!-- outer screen halo -->
  <rect x="43" y="5" width="150" height="92" rx="16" fill="#f09035" opacity="0.18" filter="url(#screen-halo-orange)"/>
  <!-- recessed screen -->
  <rect x="43" y="5" width="150" height="92" rx="16" fill="url(#screen-orange)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="43" y="5" width="150" height="92" rx="16" fill="url(#ambient-orange)"/>
  <!-- dim dot grid (九宫格) -->
  <g>
      <circle cx="78" cy="11" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="88" cy="11" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="98" cy="11" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="138" cy="11" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="148" cy="11" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="158" cy="11" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="78" cy="21" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="88" cy="21" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="148" cy="21" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="158" cy="21" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="78" cy="31" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="88" cy="31" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="98" cy="31" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="118" cy="31" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="138" cy="31" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="148" cy="31" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="158" cy="31" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="78" cy="41" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="158" cy="41" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="88" cy="51" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="148" cy="51" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="78" cy="61" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="88" cy="61" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="148" cy="61" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="158" cy="61" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="78" cy="71" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="88" cy="71" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="98" cy="71" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="138" cy="71" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="148" cy="71" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="158" cy="71" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="78" cy="81" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="88" cy="81" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="108" cy="81" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="128" cy="81" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="148" cy="81" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="158" cy="81" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="78" cy="91" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="98" cy="91" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="108" cy="91" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="118" cy="91" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="128" cy="91" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="138" cy="91" r="4" fill="#2a2418" opacity="0.5"/>
      <circle cx="158" cy="91" r="4" fill="#2a2418" opacity="0.5"/>
  </g>
  <rect x="43" y="5" width="150" height="92" rx="16" fill="url(#vignette-orange)"/>
  <rect x="43" y="5" width="150" height="92" rx="16" fill="url(#sheen-orange)"/>
</svg>
