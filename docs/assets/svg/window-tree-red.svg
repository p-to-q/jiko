<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 236 102" width="236" height="102" role="img" aria-label="jiko tree red window">
  <title>jiko tree red — lit window</title>
  <defs>
    <linearGradient id="board-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#100f0d"/>
      <stop offset="1" stop-color="#060605"/>
    </linearGradient>
    <linearGradient id="screen-red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0303"/>
      <stop offset="0.62" stop-color="#060202"/>
      <stop offset="1" stop-color="#020202"/>
    </linearGradient>
    <radialGradient id="ambient-red" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#ff6a47" stop-opacity="0.16"/>
      <stop offset="0.72" stop-color="#ff6a47" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vignette-red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0.4" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="sheen-red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="screen-halo-red" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="led-glow-red" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- board / bezel -->
  <rect x="0.5" y="0.5" width="235" height="101" rx="22" fill="url(#board-red)" stroke="#ff6a47" stroke-width="1"/>
  <rect x="6.5" y="6.5" width="223" height="89" rx="17" fill="url(#ambient-red)"/>
  <!-- outer screen halo -->
  <rect x="43" y="5" width="150" height="92" rx="16" fill="#ff6a47" opacity="0.18" filter="url(#screen-halo-red)"/>
  <!-- recessed screen -->
  <rect x="43" y="5" width="150" height="92" rx="16" fill="url(#screen-red)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="43" y="5" width="150" height="92" rx="16" fill="url(#ambient-red)"/>
